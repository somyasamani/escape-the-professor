<!DOCTYPE html>
<html>
<head>
    <title>Escape the Professor</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: Arial;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        h2 {
            text-align: center;
            margin: 10px;
        }

        canvas {
            display: block;
            margin: auto;
            background: #fff;
            border-radius: 10px;
            touch-action: none;
        }

        #scoreText {
            text-align: center;
            font-size: 20px;
        }

        button {
            display: block;
            margin: 10px auto;
            padding: 10px 20px;
            font-size: 16px;
            border-radius: 8px;
            border: none;
            background: #667eea;
            color: white;
        }
    </style>
</head>
<body>

<h2>🎮 Escape the Professor</h2>
<canvas id="gameCanvas"></canvas>
<h3 id="scoreText">Score: 0</h3>
<button onclick="restartGame()">Restart</button>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

// Fullscreen canvas
function resizeCanvas() {
    canvas.width = window.innerWidth * 0.95;
    canvas.height = window.innerHeight * 0.6;
}
resizeCanvas();
window.addEventListener("resize", resizeCanvas);

let player, professor, item, score, gameOver, speed;

function init() {
    player = { x: 50, y: 50, size: 25 };
    professor = { x: canvas.width - 50, y: canvas.height - 50, size: 25 };
    item = spawnItem();
    score = 0;
    gameOver = false;
    speed = 1.2;

    document.getElementById("scoreText").innerText = "Score: 0";
}

function spawnItem() {
    return {
        x: Math.random() * (canvas.width - 30),
        y: Math.random() * (canvas.height - 30),
        size: 20
    };
}

// 👉 Swipe control
let startX = 0, startY = 0;

canvas.addEventListener("touchstart", (e) => {
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
});

canvas.addEventListener("touchend", (e) => {
    let endX = e.changedTouches[0].clientX;
    let endY = e.changedTouches[0].clientY;

    let dx = endX - startX;
    let dy = endY - startY;

    if (Math.abs(dx) > Math.abs(dy)) {
        if (dx > 0) move("right");
        else move("left");
    } else {
        if (dy > 0) move("down");
        else move("up");
    }
});

// Keyboard also works
document.addEventListener("keydown", (e) => {
    if (e.key === "ArrowUp") move("up");
    if (e.key === "ArrowDown") move("down");
    if (e.key === "ArrowLeft") move("left");
    if (e.key === "ArrowRight") move("right");
});

function move(dir) {
    if (gameOver) return;

    let step = 30;

    if (dir === "up") player.y -= step;
    if (dir === "down") player.y += step;
    if (dir === "left") player.x -= step;
    if (dir === "right") player.x += step;

    player.x = Math.max(0, Math.min(canvas.width - 20, player.x));
    player.y = Math.max(0, Math.min(canvas.height - 20, player.y));
}

function update() {
    if (gameOver) return;

    let dx = player.x - professor.x;
    let dy = player.y - professor.y;
    let dist = Math.sqrt(dx * dx + dy * dy);

    professor.x += (dx / dist) * speed;
    professor.y += (dy / dist) * speed;

    if (Math.abs(player.x - professor.x) < 25 &&
        Math.abs(player.y - professor.y) < 25) {

        gameOver = true;

        // 📳 Vibration
        if (navigator.vibrate) {
            navigator.vibrate([200, 100, 200]);
        }

        alert("💀 Game Over!");
    }

    if (Math.abs(player.x - item.x) < 25 &&
        Math.abs(player.y - item.y) < 25) {
        score++;
        item = spawnItem();
        speed += 0.1;
        document.getElementById("scoreText").innerText = "Score: " + score;
    }
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    ctx.font = "24px Arial";
    ctx.fillText("🧑‍🎓", player.x, player.y);
    ctx.fillText("👨‍🏫", professor.x, professor.y);
    ctx.fillText("📚", item.x, item.y);
}

function gameLoop() {
    update();
    draw();
    requestAnimationFrame(gameLoop);
}

function restartGame() {
    init();
}

init();
gameLoop();
</script>

</body>
</html>
