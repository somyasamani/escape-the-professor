<!DOCTYPE html>
<html>
<head>
    <title>Escape the Professor</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            text-align: center;
            font-family: Arial;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            margin: 0;
        }

        .game-box {
            background: white;
            color: black;
            margin: 10px;
            padding: 15px;
            border-radius: 15px;
        }

        canvas {
            width: 90vw;
            max-width: 500px;
            height: auto;
            border: 3px solid black;
            border-radius: 10px;
        }

        button {
            padding: 10px 20px;
            margin: 5px;
            font-size: 18px;
            border-radius: 8px;
            border: none;
            background: #667eea;
            color: white;
        }

        .controls {
            margin-top: 10px;
        }

        .controls button {
            width: 60px;
            height: 60px;
            font-size: 20px;
        }
    </style>
</head>
<body>

<h2>🎮 Escape the Professor</h2>

<div class="game-box">
    <canvas id="gameCanvas" width="500" height="500"></canvas>
    <h3 id="scoreText">Score: 0</h3>

    <!-- Touch Controls -->
    <div class="controls">
        <div>
            <button onclick="move('up')">⬆️</button>
        </div>
        <div>
            <button onclick="move('left')">⬅️</button>
            <button onclick="move('down')">⬇️</button>
            <button onclick="move('right')">➡️</button>
        </div>
    </div>

    <button onclick="restartGame()">Restart</button>
</div>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

let player, professor, item, score, gameOver, speed;

function init() {
    player = { x: 50, y: 50, size: 20 };
    professor = { x: 400, y: 400, size: 20 };
    item = spawnItem();
    score = 0;
    gameOver = false;
    speed = 1.0;
    document.getElementById("scoreText").innerText = "Score: 0";
}

function spawnItem() {
    return {
        x: Math.random() * 480,
        y: Math.random() * 480,
        size: 15
    };
}

// Keyboard support (still works on PC)
document.addEventListener("keydown", (e) => {
    if (e.key === "ArrowUp") move("up");
    if (e.key === "ArrowDown") move("down");
    if (e.key === "ArrowLeft") move("left");
    if (e.key === "ArrowRight") move("right");
});

// Mobile buttons
function move(direction) {
    if (gameOver) return;

    let step = 25;

    if (direction === "up") player.y -= step;
    if (direction === "down") player.y += step;
    if (direction === "left") player.x -= step;
    if (direction === "right") player.x += step;

    player.x = Math.max(0, Math.min(480, player.x));
    player.y = Math.max(0, Math.min(480, player.y));
}

function update() {
    if (gameOver) return;

    let dx = player.x - professor.x;
    let dy = player.y - professor.y;
    let dist = Math.sqrt(dx * dx + dy * dy);

    professor.x += (dx / dist) * speed;
    professor.y += (dy / dist) * speed;

    if (Math.abs(player.x - professor.x) < 20 &&
        Math.abs(player.y - professor.y) < 20) {
        gameOver = true;
        alert("💀 Game Over!");
    }

    if (Math.abs(player.x - item.x) < 20 &&
        Math.abs(player.y - item.y) < 20) {
        score++;
        item = spawnItem();
        speed += 0.1;
        document.getElementById("scoreText").innerText = "Score: " + score;
    }
}

function draw() {
    ctx.clearRect(0, 0, 500, 500);

    ctx.font = "22px Arial";
    ctx.fillText("🧑‍🎓", player.x, player.y);
    ctx.fillText("👨‍🏫", professor.x, professor.y);
    ctx.fillText("📚", item.x, item.y);
}

function gameLoop() {
    update();
    draw();
    requestAnimationFrame(gameLoop);
}

function restartGame() {
    init();
}

init();
gameLoop();
</script>

</body>
</html>
