<!DOCTYPE html>
<html>
<head>
    <title>Escape the Professor</title>
    <style>
        body {
            text-align: center;
            font-family: Arial;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        h1 {
            margin-top: 20px;
        }

        .game-box {
            background: white;
            color: black;
            display: inline-block;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0px 10px 30px rgba(0,0,0,0.3);
        }

        canvas {
            background: #f9f9f9;
            border: 3px solid black;
            border-radius: 10px;
        }

        button {
            margin-top: 10px;
            padding: 10px 20px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            background: #667eea;
            color: white;
            cursor: pointer;
        }

        #memeBox {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            color: white;
            font-size: 30px;
        }
    </style>
</head>
<body>

<h1>🎮 Escape the Professor</h1>

<div class="game-box">
    <p>Use Arrow Keys 🧑‍🎓 | Avoid 👨‍🏫 | Collect 📚</p>
    <canvas id="gameCanvas" width="500" height="500"></canvas>
    <br>
    <h3 id="scoreText">Score: 0</h3>
    <button onclick="restartGame()">Restart Game</button>
</div>

<div id="memeBox">
    <div id="memeText"></div>
    <button onclick="restartGame()">Try Again 😭</button>
</div>

<!-- 🔊 Sounds -->
<audio id="collectSound" src="https://www.soundjay.com/buttons/sounds/button-3.mp3"></audio>
<audio id="gameOverSound" src="https://www.soundjay.com/misc/sounds/fail-buzzer-02.mp3"></audio>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

const collectSound = document.getElementById("collectSound");
const gameOverSound = document.getElementById("gameOverSound");

let player, professor, item, score, gameOver, speed;

const memes = [
    "💀 Bro thought he could escape internals",
    "📉 Attendance: 10%",
    "😭 Professor: 'See me after class'",
    "🪦 RIP GPA",
    "📚 You vs Backlogs → Backlogs won"
];

function init() {
    player = { x: 50, y: 50, size: 20 };
    professor = { x: 400, y: 400, size: 20 };
    item = spawnItem();
    score = 0;
    gameOver = false;
    speed = 1.0;

    document.getElementById("scoreText").innerText = "Score: 0";
    document.getElementById("memeBox").style.display = "none";
}

function spawnItem() {
    return {
        x: Math.random() * 480,
        y: Math.random() * 480,
        size: 15
    };
}

document.addEventListener("keydown", movePlayer);

function movePlayer(e) {
    if (gameOver) return;

    let step = 25;

    if (e.key === "ArrowUp") player.y -= step;
    if (e.key === "ArrowDown") player.y += step;
    if (e.key === "ArrowLeft") player.x -= step;
    if (e.key === "ArrowRight") player.x += step;

    player.x = Math.max(0, Math.min(480, player.x));
    player.y = Math.max(0, Math.min(480, player.y));
}

function update() {
    if (gameOver) return;

    let dx = player.x - professor.x;
    let dy = player.y - professor.y;
    let dist = Math.sqrt(dx * dx + dy * dy);

    professor.x += (dx / dist) * speed;
    professor.y += (dy / dist) * speed;

    // collision
    if (Math.abs(player.x - professor.x) < 20 &&
        Math.abs(player.y - professor.y) < 20) {
        gameOver = true;
        gameOverSound.play(); // 🔊 lose sound
        showMeme();
    }

    // collect
    if (Math.abs(player.x - item.x) < 20 &&
        Math.abs(player.y - item.y) < 20) {
        score++;
        item = spawnItem();
        speed += 0.1;
        collectSound.play(); // 🔊 collect sound
        document.getElementById("scoreText").innerText = "Score: " + score;
    }
}

function draw() {
    ctx.clearRect(0, 0, 500, 500);

    ctx.font = "22px Arial";
    ctx.fillText("🧑‍🎓", player.x, player.y);
    ctx.fillText("👨‍🏫", professor.x, professor.y);
    ctx.fillText("📚", item.x, item.y);

    if (gameOver) {
        ctx.fillStyle = "red";
        ctx.font = "30px Arial";
        ctx.fillText("Game Over!", 150, 250);
    }
}

function showMeme() {
    let meme = memes[Math.floor(Math.random() * memes.length)];
    document.getElementById("memeText").innerText = meme;
    document.getElementById("memeBox").style.display = "flex";
}

function gameLoop() {
    update();
    draw();
    requestAnimationFrame(gameLoop);
}

function restartGame() {
    init();
}

init();
gameLoop();
</script>

</body>
</html>
